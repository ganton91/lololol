<!doctype html>
<html lang="el">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CAD Starter</title>
    <style>
      :root {
        --bg: #f4f5f8;
        --panel: #ffffff;
        --ink: #0f172a;
        --muted: #475569;
        --line: #e2e8f0;
        --accent: #0ea5e9;
        --canvas-bg: #fcfcfb;
        --ui-bg-elevated: rgba(255, 255, 255, 0.82);
        --ui-surface: rgba(255, 255, 255, 0.7);
        --ui-surface-strong: rgba(255, 255, 255, 0.95);
        --ui-line: rgba(20, 24, 28, 0.1);
        --ui-line-strong: rgba(20, 24, 28, 0.18);
        --ui-text: #161b21;
        --ruler-bg: rgba(248, 248, 246, 0.95);
        --canvas-ruler-size: 28px;
      }

      * {
        box-sizing: border-box;
      }

      button:focus {
        outline: none;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.32), transparent 28%),
          linear-gradient(180deg, #f5f4f1, color-mix(in srgb, #f5f4f1 86%, black 4%));
        color: var(--ink);
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      }

      button,
      input {
        font: inherit;
      }

      button {
        color: inherit;
      }

      #app {
        position: relative;
        width: 100vw;
        height: 100vh;
        display: grid;
        grid-template-rows: 48px 1fr;
      }

      .topbar {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 8px 12px;
        border-bottom: 1px solid var(--ui-line);
        background: var(--ui-bg-elevated);
        backdrop-filter: blur(18px);
        color: var(--ui-text);
        z-index: 20;
      }

      .brand {
        display: flex;
        align-items: center;
        min-width: max-content;
      }

      .brand-name {
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.01em;
      }

      .separator {
        width: 1px;
        height: 16px;
        background: var(--ui-line-strong);
      }

      .toolbar-actions {
        display: flex;
        gap: 6px;
      }

      .ghost-button {
        border: 1px solid var(--ui-line);
        background: var(--ui-surface);
        color: inherit;
        border-radius: 12px;
        cursor: pointer;
        transition: 140ms ease;
        padding: 6px 10px;
        font-size: 11px;
      }

      .ghost-button:hover {
        background: var(--ui-surface-strong);
        border-color: var(--ui-line-strong);
      }

      .ghost-button.stub {
        opacity: 0.82;
      }

      .workspace-shell {
        position: relative;
        display: grid;
        grid-template-columns: auto minmax(0, 1fr);
        min-height: 0;
        overflow: hidden;
      }

      .layers-panel {
        position: relative;
        width: 280px;
        height: 100%;
        display: flex;
        flex-direction: column;
        min-height: 0;
        overflow: hidden;
        border-right: 1px solid var(--ui-line);
        background: var(--ui-bg-elevated);
        backdrop-filter: blur(18px);
        z-index: 10;
      }

      .layers-panel.collapsed {
        width: 54px;
      }

      .layers-body {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 12px;
        min-height: 0;
        overflow-y: auto;
        overflow-x: hidden;
        scrollbar-width: none;
      }

      .layers-body::-webkit-scrollbar {
        display: none;
      }

      .layers-panel.collapsed .layers-body {
        display: none;
      }

      .panel-section {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .panel-section.collapsed .layer-list {
        display: none;
      }

      .section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        min-height: 32px;
        padding: 6px 9px;
      }

      .section-header-left {
        min-width: 0;
      }

      .section-toggle {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 0;
        border: 0;
        background: transparent;
        color: inherit;
        cursor: pointer;
      }

      .section-toggle-arrow {
        width: 8px;
        height: 8px;
        display: inline-block;
        border-right: 1.5px solid currentColor;
        border-bottom: 1.5px solid currentColor;
        transform: translateY(-1px) rotate(45deg);
        transition: transform 140ms ease;
        color: var(--muted);
      }

      .panel-section.collapsed .section-toggle-arrow {
        transform: translateY(-1px) rotate(-45deg);
      }

      .section-header-title {
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .section-header-action {
        width: 26px;
        height: 26px;
        display: grid;
        place-items: center;
        position: relative;
        padding: 0;
        border-radius: 8px;
        border: 1px solid var(--ui-line);
        background: var(--ui-surface);
        cursor: pointer;
        color: inherit;
        transition: 140ms ease;
      }

      .section-header-action:hover {
        background: var(--ui-surface-strong);
        border-color: var(--ui-line-strong);
      }

      .section-header-action:active {
        background: rgba(17, 24, 39, 0.08);
        border-color: var(--ui-line-strong);
        transform: translateY(0.5px);
      }

      .section-header-action::before,
      .section-header-action::after {
        content: "";
        position: absolute;
        left: 50%;
        top: 50%;
        width: 10px;
        height: 1px;
        border-radius: 999px;
        background: currentColor;
        transform: translate(-50%, -50%);
      }

      .section-header-action::after {
        width: 1px;
        height: 10px;
      }

      .layer-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding-right: 2px;
      }

      .drawing-card {
        display: grid;
        grid-template-columns: 16px minmax(0, 1fr);
        align-items: start;
        gap: 8px;
        padding: 10px;
        border-radius: 14px;
        border: 1px solid var(--ui-line);
        background: var(--ui-surface);
        position: relative;
      }

      .drawing-card.inactive-drawing {
        align-items: center;
        padding-top: 8px;
        padding-bottom: 8px;
      }

      .drawing-card.active-drawing {
        background: rgba(17, 24, 39, 0.08);
        border-color: var(--ui-line-strong);
      }

      .drawing-card.inactive-drawing .drawing-children {
        display: none;
      }

      .drawing-card.dragging {
        opacity: 0.55;
      }

      .drawing-card.drag-insert-before::before,
      .drawing-card.drag-insert-after::after {
        content: "";
        position: absolute;
        left: 8px;
        right: 8px;
        height: 2px;
        background: color-mix(in srgb, var(--ui-text) 24%, transparent);
        box-shadow: 0 0 0 1px color-mix(in srgb, var(--ui-text) 8%, transparent);
        pointer-events: none;
      }

      .drawing-card.drag-insert-before::before {
        top: -6px;
      }

      .drawing-card.drag-insert-after::after {
        bottom: -6px;
      }

      .drawing-main {
        display: flex;
        flex-direction: column;
        gap: 8px;
        min-width: 0;
      }

      .drawing-children {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .drawing-subsection {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .drawing-subsection-header {
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 0 2px;
      }

      .drawing-subsection-toggle {
        flex: 1 1 auto;
        display: flex;
        align-items: center;
        gap: 4px;
        background: none;
        border: none;
        padding: 2px 0;
        cursor: pointer;
        font-size: 10px;
        font-weight: 600;
        color: var(--muted);
        letter-spacing: 0.04em;
        text-transform: uppercase;
        text-align: left;
      }

      .drawing-subsection-toggle:hover {
        color: var(--ui-text);
      }

      .drawing-subsection-toggle-arrow {
        font-size: 8px;
        transition: transform 0.15s;
        display: inline-block;
      }

      .drawing-subsection.collapsed .drawing-subsection-toggle-arrow {
        transform: rotate(-90deg);
      }

      .drawing-subsection.collapsed .drawing-subsection-list {
        display: none;
      }

      .drawing-subsection-add {
        background: none;
        border: none;
        padding: 2px 4px;
        cursor: pointer;
        font-size: 14px;
        line-height: 1;
        color: var(--muted);
        border-radius: 4px;
      }

      .drawing-subsection-add:hover {
        color: var(--ui-text);
        background: var(--ui-line);
      }

      .drawing-subsection-list {
        display: flex;
        flex-direction: column;
        gap: 4px;
        padding-left: 16px;
      }

      .drag-handle {
        cursor: grab;
        font-size: 14px;
        color: var(--muted);
        text-align: center;
        user-select: none;
      }

      .layers-panel.drag-reordering,
      .layers-panel.drag-reordering * {
        cursor: grabbing !important;
      }

      .layer-card {
        display: grid;
        grid-template-columns: 16px minmax(0, 1fr);
        align-items: start;
        gap: 8px;
        padding: 10px;
        border-radius: 14px;
        border: 1px solid var(--ui-line);
        background: var(--ui-surface);
        position: relative;
      }

      .layer-card.active {
        background: rgba(17, 24, 39, 0.08);
        border-color: var(--ui-line-strong);
      }

      .layer-card.inactive-collapsed {
        align-items: center;
        padding-top: 8px;
        padding-bottom: 8px;
      }

      .layer-card.inactive-collapsed .layer-main {
        gap: 0;
      }

      .layer-card.inactive-collapsed .layer-main > :not(:first-child) {
        display: none;
      }

      .layer-card.dragging {
        opacity: 0.55;
      }

      .layer-card.drag-insert-before::before,
      .layer-card.drag-insert-after::after {
        content: "";
        position: absolute;
        left: 8px;
        right: 8px;
        height: 2px;
        background: color-mix(in srgb, var(--ui-text) 24%, transparent);
        box-shadow: 0 0 0 1px color-mix(in srgb, var(--ui-text) 8%, transparent);
        pointer-events: none;
      }

      .layer-card.drag-insert-before::before {
        top: -6px;
      }

      .layer-card.drag-insert-after::after {
        bottom: -3px;
      }

      .drawing-subsection-list .layer-card.drag-insert-before::before {
        top: -4px;
      }

      .drawing-subsection-list .layer-card.drag-insert-after::after {
        bottom: -4px;
      }

      .layer-main {
        min-width: 0;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }

      .card-header {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        min-width: 0;
      }

      .card-header-title {
        min-width: 0;
        flex: 1 1 auto;
      }

      .layer-name {
        width: auto;
        max-width: 100%;
        display: inline-block;
        padding: 0;
        border: 0;
        background: transparent;
        color: inherit;
        font-size: 12px;
        font-weight: 600;
      }

      .layer-name {
        width: auto;
        max-width: 100%;
        display: inline-block;
        padding: 0;
        border: 0;
        background: transparent;
        color: inherit;
        font-size: 12px;
        font-weight: 600;
      }

      .layer-name:focus {
        outline: none;
      }

      .layer-name-label {
        width: auto;
        max-width: 100%;
        display: inline-block;
        font-size: 12px;
        font-weight: 600;
        color: inherit;
        line-height: 1.35;
        cursor: default;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        transform: translateY(1.5px);
      }

      .layer-meta,
      .layer-meta-secondary {
        font-size: 11px;
        color: var(--muted);
      }

      .inline-controls {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        flex: 0 0 auto;
      }

      .inline-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 16px;
        height: 16px;
        padding: 0;
        border: 0;
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        line-height: 1;
        transition: color 140ms ease, opacity 140ms ease;
      }

      .inline-icon:hover {
        color: var(--ui-text);
      }

      .inline-icon svg {
        width: 14px;
        height: 14px;
        display: block;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .field label {
        font-size: 11px;
        color: var(--muted);
      }

      .field input,
      .field select {
        width: 100%;
        padding: 8px 10px;
        border-radius: 10px;
        border: 1px solid var(--ui-line);
        background: var(--ui-surface-strong);
        color: inherit;
      }

      .field input[type="range"] {
        max-width: 132px;
        padding: 0;
        border: 0;
        border-radius: 0;
        background: transparent;
        appearance: none;
        -webkit-appearance: none;
      }

      .field input[type="range"]::-webkit-slider-runnable-track {
        height: 4px;
        border-radius: 999px;
        background: var(--ui-line-strong);
      }

      .field input[type="range"]::-webkit-slider-thumb {
        width: 12px;
        height: 12px;
        margin-top: -4px;
        border: 0;
        border-radius: 50%;
        background: var(--ui-text);
        appearance: none;
        -webkit-appearance: none;
        box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.08);
      }

      .field input[type="range"]::-moz-range-track {
        height: 4px;
        border: 0;
        border-radius: 999px;
        background: var(--ui-line-strong);
      }

      .field input[type="range"]::-moz-range-thumb {
        width: 12px;
        height: 12px;
        border: 0;
        border-radius: 50%;
        background: var(--ui-text);
        box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.08);
      }

      .menu-panel {
        z-index: 30;
      }

      .modal-panel {
        position: fixed;
        top: 50%;
        left: 50%;
        width: min(540px, calc(100vw - 40px));
        padding: 18px;
        border: 1px solid var(--ui-line);
        border-radius: 18px;
        background: var(--ui-surface-strong);
        backdrop-filter: blur(18px);
        box-shadow: 0 18px 48px rgba(17, 24, 39, 0.12);
        transform: translate(-50%, -50%);
      }

      .hidden {
        display: none;
      }

      .menu-title {
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .tool-heading {
        margin-top: 4px;
        font-size: 13px;
        font-weight: 600;
        color: var(--ui-text);
      }

      .settings-group + .settings-group {
        margin-top: 16px;
        padding-top: 14px;
        border-top: 1px solid var(--ui-line);
      }

      .settings-group-title {
        margin: 14px 0 10px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .menu-section {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .menu-section + .menu-section {
        margin-top: 14px;
        padding-top: 14px;
        border-top: 1px solid var(--ui-line);
      }

      .menu-actions {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .mode-button {
        padding: 9px 10px;
        text-align: center;
        font-size: 12px;
        white-space: nowrap;
        border: 1px solid var(--ui-line);
        background: var(--ui-surface);
        color: inherit;
        border-radius: 12px;
        cursor: pointer;
        transition: 140ms ease;
      }

      .mode-button:hover {
        background: var(--ui-surface-strong);
        border-color: var(--ui-line-strong);
      }

      .mode-button.active {
        background: rgba(17, 24, 39, 0.08);
        border-color: var(--ui-line-strong);
      }

      .stepper-actions {
        align-items: center;
        gap: 6px;
      }

      .stepper-value {
        min-width: 84px;
        width: 84px;
        padding: 9px 12px;
        border: 1px solid var(--ui-line);
        border-radius: 12px;
        background: var(--ui-surface-strong);
        color: var(--ui-text);
        font-size: 12px;
        font-weight: 600;
        text-align: center;
        box-sizing: border-box;
      }

      .stepper-input {
        appearance: textfield;
        -moz-appearance: textfield;
      }

      .stepper-input::-webkit-outer-spin-button,
      .stepper-input::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }

      .settings-unit-tag {
        min-width: 52px;
        padding: 9px 12px;
        border: 1px solid var(--ui-line);
        border-radius: 12px;
        background: var(--ui-surface);
        color: var(--muted);
        font-size: 12px;
        font-weight: 600;
        text-align: center;
      }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        background: transparent;
        z-index: 29;
      }

      .calibration-actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        margin-top: 14px;
      }

      .settings-actions {
        margin-top: 18px;
        padding-top: 14px;
        border-top: 1px solid var(--ui-line);
      }

      .modal-action-button {
        transition:
          background 140ms ease,
          border-color 140ms ease,
          transform 120ms ease;
      }

      .modal-action-button:active:not(:disabled) {
        background: rgba(17, 24, 39, 0.08);
        border-color: var(--ui-line-strong);
        transform: translateY(0.5px);
      }

      .canvas-shell {
        position: relative;
        min-width: 0;
        min-height: 0;
        overflow: hidden;
      }

      .canvas-stage {
        position: absolute;
        inset: 0;
        min-width: 0;
        min-height: 0;
      }

      .draft-ruler-corner,
      .draft-ruler-top,
      .draft-ruler-left,
      .draft-ruler-bottom,
      .draft-ruler-right {
        position: absolute;
        background: var(--ruler-bg);
        border-color: var(--line);
        z-index: 2;
        pointer-events: none;
      }

      .draft-ruler-corner {
        width: var(--canvas-ruler-size);
        height: var(--canvas-ruler-size);
      }

      .draft-ruler-corner.is-top-left {
        top: 0;
        left: 0;
        border-right: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
        z-index: 3;
      }

      .draft-ruler-corner.is-top-right {
        top: 0;
        right: 0;
        border-left: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
        z-index: 3;
      }

      .draft-ruler-corner.is-bottom-left {
        left: 0;
        bottom: 0;
        border-right: 1px solid var(--line);
        border-top: 1px solid var(--line);
        z-index: 3;
      }

      .draft-ruler-corner.is-bottom-right {
        right: 0;
        bottom: 0;
        border-left: 1px solid var(--line);
        border-top: 1px solid var(--line);
        z-index: 3;
      }

      .draft-ruler-top {
        top: 0;
        left: var(--canvas-ruler-size);
        width: calc(100% - (var(--canvas-ruler-size) * 2));
        height: var(--canvas-ruler-size);
        border-bottom: 1px solid var(--line);
      }

      .draft-ruler-left {
        top: var(--canvas-ruler-size);
        left: 0;
        width: var(--canvas-ruler-size);
        height: calc(100% - (var(--canvas-ruler-size) * 2));
        border-right: 1px solid var(--line);
      }

      .draft-ruler-bottom {
        left: var(--canvas-ruler-size);
        bottom: 0;
        width: calc(100% - (var(--canvas-ruler-size) * 2));
        height: var(--canvas-ruler-size);
        border-top: 1px solid var(--line);
      }

      .draft-ruler-right {
        top: var(--canvas-ruler-size);
        right: 0;
        width: var(--canvas-ruler-size);
        height: calc(100% - (var(--canvas-ruler-size) * 2));
        border-left: 1px solid var(--line);
      }

      .canvas-viewport {
        position: absolute;
        top: var(--canvas-ruler-size);
        right: var(--canvas-ruler-size);
        bottom: var(--canvas-ruler-size);
        left: var(--canvas-ruler-size);
        overflow: hidden;
        background: var(--canvas-bg);
      }

      #cad-canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
        background: var(--canvas-bg);
        cursor: crosshair;
      }

      .toolbar {
        position: absolute;
        top: calc(var(--canvas-ruler-size) + 16px);
        left: calc(var(--canvas-ruler-size) + 16px);
        z-index: 10;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
        max-width: calc(100% - (var(--canvas-ruler-size) * 2) - 32px);
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: color-mix(in srgb, var(--panel) 90%, transparent);
        backdrop-filter: blur(6px);
        box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
      }

      .tool-btn,
      .shape-select {
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #fff;
        color: var(--ink);
        font-size: 14px;
        padding: 8px 10px;
        transition: 120ms ease;
      }

      .shape-select {
        min-width: 120px;
      }

      .tool-size {
        width: 74px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #fff;
        color: var(--ink);
        font-size: 14px;
        padding: 8px 10px;
      }

      .tool-size:disabled {
        background: #f8fafc;
        color: #94a3b8;
        cursor: not-allowed;
      }

      .tool-btn {
        cursor: pointer;
      }

      .tool-btn:hover,
      .shape-select:hover {
        border-color: #cbd5e1;
      }

      .tool-btn.active {
        border-color: var(--accent);
        background: #e0f2fe;
        color: #0c4a6e;
      }

      .workplane-status {
        font-size: 12px;
        color: var(--muted);
        white-space: nowrap;
      }

    </style>
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="brand">
          <div class="brand-name">millimétré</div>
        </div>
        <div class="separator"></div>
        <div class="toolbar-actions">
          <button class="ghost-button stub" id="undoButton" type="button">Undo</button>
          <button class="ghost-button stub" id="redoButton" type="button">Redo</button>
          <button class="ghost-button" id="settingsButton" type="button">Settings</button>
          <button class="ghost-button stub" id="exportButton" type="button">Export</button>
          <button class="ghost-button stub" id="importButton" type="button">Import</button>
        </div>
      </header>

      <div class="workspace-shell">
        <aside class="layers-panel" id="layersPanel">
          <div class="layers-body">
            <div class="panel-section" id="layerSection">
              <div class="section-header">
                <div class="section-header-left">
                  <button class="section-toggle" id="layerSectionToggle" type="button" aria-expanded="true">
                    <span class="section-toggle-arrow" aria-hidden="true"></span>
                    <span class="section-header-title">Drawings</span>
                  </button>
                </div>
                <button class="section-header-action" id="addDrawingButton" type="button" aria-label="Add drawing"></button>
              </div>
              <div id="layers-list" class="layer-list"></div>
            </div>
          </div>
          <input id="layer-fill" type="color" value="#93c5fd" hidden />
        </aside>

        <div class="canvas-shell">
          <div class="canvas-stage">
            <div class="draft-ruler-corner is-top-left" aria-hidden="true"></div>
            <div class="draft-ruler-corner is-top-right" aria-hidden="true"></div>
            <div class="draft-ruler-corner is-bottom-left" aria-hidden="true"></div>
            <canvas id="draft-ruler-top" class="draft-ruler-top" aria-hidden="true"></canvas>
            <canvas id="draft-ruler-left" class="draft-ruler-left" aria-hidden="true"></canvas>
            <canvas id="draft-ruler-bottom" class="draft-ruler-bottom" aria-hidden="true"></canvas>
            <canvas id="draft-ruler-right" class="draft-ruler-right" aria-hidden="true"></canvas>
            <div class="draft-ruler-corner is-bottom-right" aria-hidden="true"></div>
            <div class="canvas-viewport">
              <canvas id="cad-canvas"></canvas>
            </div>
          </div>

          <div class="toolbar">
            <button id="select-tool" class="tool-btn" type="button">Select</button>
            <button id="draw-tool" class="tool-btn active" type="button">Draw</button>

            <select id="shape-select" class="shape-select" aria-label="Shape">
              <option value="rect">Rectangle</option>
              <option value="ellipse">Ellipse</option>
              <option value="strip">Stroke Rect</option>
              <option value="square-brush">Square Brush</option>
            </select>
            <input
              id="draw-size"
              class="tool-size"
              type="number"
              min="1"
              max="50"
              step="1"
              value="1"
              title="Tool size"
              aria-label="Tool size"
            />
            <button id="zoom-out" class="tool-btn" type="button" aria-label="Zoom out">-</button>
            <button id="zoom-in" class="tool-btn" type="button" aria-label="Zoom in">+</button>
            <span id="zoom-level" style="font-size: 12px; color: #334155; min-width: 52px">100%</span>
            <span id="workplane-status" class="workplane-status">Plane: world | Rot: 0deg | Origin: 0, 0</span>
          </div>
        </div>
      </div>
    </div>

    <div class="menu-panel modal-panel hidden" id="settingsMenu" role="dialog" aria-modal="true" aria-labelledby="settingsMenuHeading">
      <div class="menu-title">Settings</div>
      <div class="tool-heading" id="settingsMenuHeading">Units and Grid</div>

      <div class="settings-group">
        <div class="settings-group-title">Display Units</div>

        <div class="menu-section">
          <div class="menu-title">Display Unit</div>
          <div class="menu-actions">
            <button class="mode-button" data-settings-display-unit="mm" type="button">Millimeters</button>
            <button class="mode-button" data-settings-display-unit="cm" type="button">Centimeters</button>
            <button class="mode-button" data-settings-display-unit="m" type="button">Meters</button>
          </div>
        </div>

        <div class="menu-section">
          <div class="menu-title">Grid</div>
          <div class="menu-actions">
            <button class="mode-button" data-settings-grid-unit="mm" type="button">Millimeters</button>
            <button class="mode-button" data-settings-grid-unit="cm" type="button">Centimeters</button>
            <button class="mode-button" data-settings-grid-unit="m" type="button">Meters</button>
          </div>
        </div>

        <div class="menu-section">
          <div class="menu-title">Cell Size</div>
          <div class="menu-actions stepper-actions">
            <input class="stepper-value stepper-input" id="settingsCellSizeInput" type="number" min="1" step="1" value="5" />
            <div class="settings-unit-tag" id="settingsCellUnitTag">cm</div>
          </div>
        </div>
      </div>

      <div class="calibration-actions settings-actions">
        <button class="ghost-button modal-action-button" id="settingsCloseButton" type="button">Close</button>
        <button class="ghost-button modal-action-button" id="settingsApplyButton" type="button">Apply</button>
      </div>
    </div>

    <div class="modal-backdrop hidden" id="modalBackdrop"></div>

    <script type="importmap">
      {
        "imports": {
          "clipper2-ts": "./node_modules/clipper2-ts/dist/index.js"
        }
      }
    </script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
